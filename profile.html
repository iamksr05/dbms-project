<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusNet | Profile</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container" style="grid-template-columns: 1fr;">
        <div class="card">
            <div style="display: flex; gap: 2rem; align-items: start;">
                <div class="avatar" style="width: 100px; height: 100px; font-size: 2.5rem;">D</div>
                <div>
                    <h1 id="prof-username" style="font-size: 2rem; margin-bottom: 0.5rem;">@dev_dave</h1>
                    <p id="prof-bio" style="color: var(--text-secondary); margin-bottom: 1rem;">Software developer building the future.</p>
                    <div style="display: flex; gap: 2rem; font-size: 0.9rem; color: var(--text-secondary);">
                        <span>📅 Registered Jan 2023</span>
                        <span>👥 3 Subscribers</span>
                        <span>👤 3 Publishing</span>
                    </div>
                </div>
                <div style="margin-left: auto;">
                    <button class="btn">Connect</button>
                </div>
            </div>
        </div>
        <div style="max-width: 800px; margin: 0 auto; width: 100%;">
            <h2 style="margin-bottom: 1.5rem;">Posts</h2>
            <div id="profile-feed">
                
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
